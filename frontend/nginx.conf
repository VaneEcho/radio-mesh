server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── Proxy /api/* to the Cloud backend ────────────────────────────────────
    # In Docker Compose the cloud service is reachable at http://cloud:8000.
    # This also handles WebSocket upgrades (ws:// heartbeat endpoint).
    location /api/ {
        proxy_pass         http://cloud:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

        # WebSocket support (needed for WS /api/v1/stations/{id}/ws)
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_read_timeout 3600s;
    }

    # ── SPA fallback ─────────────────────────────────────────────────────────
    # All non-file requests go to index.html so Vue Router handles the path.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Caching ──────────────────────────────────────────────────────────────
    # Vite hashes asset filenames → safe to cache indefinitely.
    # index.html must not be cached so updates are picked up immediately.
    location ~* \.(?:js|css|woff2?|png|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
