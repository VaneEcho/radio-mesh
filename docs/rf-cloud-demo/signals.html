<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RF·MIND — 信号库</title>
<link rel="stylesheet" href="assets/style.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
.signals-layout {
  display: grid;
  grid-template-columns: 340px 1fr;
  gap: 14px;
  height: calc(100vh - var(--nav-height) - 40px);
}

/* Left: list */
.sig-list-col {
  display: flex;
  flex-direction: column;
  gap: 10px;
  min-height: 0;
}

.filter-tabs {
  display: flex;
  gap: 4px;
  padding: 10px;
  background: var(--bg-card);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  flex-shrink: 0;
}

.filter-tab {
  flex: 1;
  padding: 5px 4px;
  border-radius: var(--radius-sm);
  border: 1px solid transparent;
  background: transparent;
  color: var(--text-muted);
  font-size: 11px;
  cursor: pointer;
  text-align: center;
  transition: all var(--transition-fast);
  font-family: var(--font-sans);
  font-weight: 500;
}

.filter-tab:hover { background: var(--bg-elevated); color: var(--text-secondary); }
.filter-tab.active { background: rgba(6,182,212,0.1); color: var(--accent-cyan); border-color: rgba(6,182,212,0.25); }
.filter-tab.f-alert.active { background: rgba(239,68,68,0.1); color: var(--accent-red); border-color: rgba(239,68,68,0.25); }
.filter-tab.f-unknown.active { background: rgba(245,158,11,0.1); color: var(--accent-amber); border-color: rgba(245,158,11,0.25); }

.sig-list-scroll {
  flex: 1;
  overflow-y: auto;
  min-height: 0;
  background: var(--bg-card);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  padding: 8px;
}

.sig-list-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: var(--radius-md);
  cursor: pointer;
  border: 1px solid transparent;
  transition: all var(--transition-fast);
  margin-bottom: 2px;
}

.sig-list-item:hover { background: var(--bg-hover); }
.sig-list-item.active { background: rgba(59,130,246,0.08); border-color: rgba(59,130,246,0.2); }

.sig-status-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}
.ssd-known   { background: var(--accent-green); }
.ssd-unknown { background: var(--accent-amber); }
.ssd-alert   { background: var(--accent-red); animation: blink 1.5s ease-in-out infinite; }

.sig-item-body { flex: 1; min-width: 0; }
.sig-item-freq { font-family: var(--font-mono); font-size: 11.5px; font-weight: 600; color: var(--text-primary); }
.sig-item-name { font-size: 11px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }

.sig-item-right { text-align: right; flex-shrink: 0; }
.sig-conf { font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); }

/* Right: detail */
.sig-detail-col {
  display: flex;
  flex-direction: column;
  gap: 10px;
  min-height: 0;
  overflow-y: auto;
}

/* Alert box at top */
.alert-section {
  background: rgba(239,68,68,0.05);
  border: 1px solid rgba(239,68,68,0.2);
  border-radius: var(--radius-lg);
  overflow: hidden;
  flex-shrink: 0;
}

.alert-section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  background: rgba(239,68,68,0.08);
  border-bottom: 1px solid rgba(239,68,68,0.15);
  cursor: pointer;
}

.alert-section-title {
  font-size: 11.5px;
  font-weight: 700;
  color: var(--accent-red);
  display: flex;
  align-items: center;
  gap: 6px;
}

.alert-section-body { padding: 0; }

.alert-tab-bar {
  display: flex;
  border-bottom: 1px solid rgba(239,68,68,0.15);
}

.alert-tab {
  flex: 1;
  padding: 8px;
  text-align: center;
  font-size: 11px;
  color: var(--text-muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all var(--transition-fast);
  border-right: 1px solid rgba(239,68,68,0.1);
}

.alert-tab:last-child { border-right: none; }
.alert-tab:hover { color: var(--text-secondary); }
.alert-tab.active { color: var(--accent-red); border-bottom-color: var(--accent-red); }

.alert-content { padding: 14px; }

/* Waveform display */
.waveform-display {
  height: 52px;
  background: var(--bg-elevated);
  border-radius: var(--radius-md);
  padding: 4px 8px;
  display: flex;
  align-items: center;
  gap: 1px;
  margin: 10px 0;
  border: 1px solid var(--border-subtle);
  overflow: hidden;
}

/* Detail sections */
.detail-section {
  background: var(--bg-card);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  overflow: hidden;
}

.detail-section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border-subtle);
}

.detail-section-title {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-secondary);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 6px;
}

.detail-section-body { padding: 14px; }

/* Small map */
#detail-map {
  height: 180px;
  border-radius: var(--radius-md);
  overflow: hidden;
  background: var(--bg-elevated);
}

/* Timeline */
.timeline { }
.tl-item {
  display: flex;
  gap: 12px;
  padding: 8px 0;
  border-bottom: 1px solid var(--border-subtle);
}
.tl-item:last-child { border-bottom: none; }
.tl-time { font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); width: 130px; flex-shrink: 0; padding-top: 1px; }
.tl-dot  { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 3px; }
.tl-body { flex: 1; font-size: 11.5px; color: var(--text-secondary); }

/* Info grid */
.info-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
}
.info-cell { }
.info-cell-label { font-family: var(--font-mono); font-size: 9px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 3px; }
.info-cell-value { font-family: var(--font-mono); font-size: 13px; color: var(--text-primary); font-weight: 500; }

/* AI verdict box */
.verdict-box {
  background: var(--bg-elevated);
  border-radius: var(--radius-md);
  padding: 12px;
  margin-top: 10px;
  border: 1px solid var(--border-subtle);
}
.verdict-label { font-size: 10px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 6px; }
.verdict-text  { font-size: 12px; color: var(--text-secondary); line-height: 1.7; }

/* Demo section */
.demo-section {
  background: linear-gradient(135deg, rgba(59,130,246,0.05), rgba(6,182,212,0.03));
  border: 1px solid rgba(59,130,246,0.15);
  border-radius: var(--radius-lg);
  overflow: hidden;
}

.demo-step {
  display: flex;
  gap: 12px;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border-subtle);
  opacity: 0.35;
  transition: opacity 0.4s ease;
}

.demo-step.active { opacity: 1; }
.demo-step.done   { opacity: 0.7; }

.demo-step-num {
  width: 22px; height: 22px;
  border-radius: 50%;
  border: 1.5px solid var(--border-normal);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-mono); font-size: 10px; font-weight: 600;
  color: var(--text-muted);
  flex-shrink: 0;
}

.demo-step.active .demo-step-num {
  border-color: var(--accent-cyan);
  color: var(--accent-cyan);
  background: rgba(6,182,212,0.1);
  box-shadow: 0 0 10px rgba(6,182,212,0.2);
}

.demo-step.done .demo-step-num {
  border-color: var(--accent-green);
  color: var(--accent-green);
  background: rgba(16,185,129,0.1);
}

.demo-step-body { flex: 1; }
.demo-step-title { font-size: 12px; font-weight: 600; color: var(--text-primary); margin-bottom: 2px; }
.demo-step-desc  { font-size: 11px; color: var(--text-muted); line-height: 1.5; }

.demo-step-result {
  margin-top: 6px;
  padding: 6px 10px;
  background: rgba(6,182,212,0.06);
  border-radius: var(--radius-sm);
  font-family: var(--font-mono);
  font-size: 10.5px;
  color: var(--accent-cyan);
  display: none;
}

.demo-step.done .demo-step-result { display: block; }

/* Blurred content */
.censored {
  filter: blur(4px);
  background: rgba(239,68,68,0.1);
  border-radius: 2px;
  padding: 0 2px;
  user-select: none;
}
</style>
</head>
<body>

<nav id="nav"></nav>
<div id="tour-overlay"><div id="tour-tooltip"></div></div>

<main class="page">
<div class="signals-layout">

  <!-- Left: signal list -->
  <div class="sig-list-col">
    <div class="filter-tabs" id="filter-tabs">
      <button class="filter-tab active" onclick="filterSignals('all', this)">全部</button>
      <button class="filter-tab f-alert" onclick="filterSignals('alert', this)">⚠ 告警</button>
      <button class="filter-tab f-unknown" onclick="filterSignals('unknown', this)">未知</button>
      <button class="filter-tab" onclick="filterSignals('known', this)">已知</button>
    </div>
    <div class="sig-list-scroll" id="sig-list"></div>
  </div>

  <!-- Right: details -->
  <div class="sig-detail-col" id="sig-detail-col">

    <!-- Alert section (always visible at top) -->
    <div class="alert-section" id="alert-section">
      <div class="alert-section-header" onclick="toggleAlertSection()">
        <div class="alert-section-title">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M6.5 1L1 11h11L6.5 1z"/><line x1="6.5" y1="5" x2="6.5" y2="8"/>
            <circle cx="6.5" cy="9.5" r="0.4" fill="currentColor"/>
          </svg>
          活跃告警专区 · 3条
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <span class="badge badge-red">处理中</span>
          <span style="color:var(--text-dim);font-size:11px" id="alert-toggle-icon">▲</span>
        </div>
      </div>
      <div class="alert-section-body" id="alert-body">
        <div class="alert-tab-bar">
          <div class="alert-tab active" onclick="showAlert(0, this)">📻 97.4 MHz 黑广播</div>
          <div class="alert-tab" onclick="showAlert(1, this)">📡 GPS L1 干扰</div>
          <div class="alert-tab" onclick="showAlert(2, this)">✈ 航空VHF干扰</div>
        </div>
        <div class="alert-content" id="alert-content"></div>
      </div>
    </div>

    <!-- Signal detail panel -->
    <div id="detail-panel">
      <div style="padding:24px;text-align:center;color:var(--text-dim);font-size:12px;background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:var(--radius-lg)">
        从左侧列表选择信号查看完整分析
      </div>
    </div>

    <!-- Demo section -->
    <div class="demo-section" id="demo-section">
      <div style="padding:12px 14px;border-bottom:1px solid var(--border-subtle);display:flex;align-items:center;justify-content:space-between">
        <div style="font-size:12px;font-weight:700;color:var(--accent-primary);letter-spacing:0.04em">
          AI定性推进演示 — 未知信号 SIG-008（351.225 MHz）
        </div>
        <button class="btn btn-primary" style="font-size:11px;padding:6px 12px" id="demo-btn" onclick="startDemo()">▶ 开始演示</button>
      </div>
      <div id="demo-steps">
        <!-- Injected by JS -->
      </div>
    </div>

  </div>
</div>
</main>

<script src="assets/common.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ── State ─────────────────────────────────────────────────────
let currentFilter = 'all';
let selectedSig = null;
let detailMap = null;
let alertOpen = true;
let currentAlertIdx = 0;

// ── Filter & list ─────────────────────────────────────────────
function filterSignals(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderList();
}

function renderList() {
  const filtered = SIGNALS.filter(s =>
    currentFilter === 'all' ? true : s.status === currentFilter
  );
  document.getElementById('sig-list').innerHTML = filtered.map(s => {
    const dotClass = { known:'ssd-known', unknown:'ssd-unknown', alert:'ssd-alert' }[s.status];
    const statusColor = { known:'var(--accent-green)', unknown:'var(--accent-amber)', alert:'var(--accent-red)' }[s.status];
    return `
      <div class="sig-list-item${selectedSig?.id === s.id ? ' active' : ''}" id="li-${s.id}" onclick="selectSig('${s.id}')">
        <div class="sig-status-dot ${dotClass}"></div>
        <div class="sig-item-body">
          <div class="sig-item-freq" style="color:${statusColor}">${s.freqStr}</div>
          <div class="sig-item-name">${s.label}</div>
        </div>
        <div class="sig-item-right">
          <div class="sig-conf">${s.confidence}%</div>
        </div>
      </div>
    `;
  }).join('');
}

// ── Select signal ─────────────────────────────────────────────
function selectSig(id) {
  selectedSig = SIGNALS.find(s => s.id === id);
  renderList(); // re-render to update active

  const sig = selectedSig;
  const statusBadge = { known:'<span class="badge badge-green">已知</span>',
    unknown:'<span class="badge badge-amber">未知待定性</span>',
    alert:'<span class="badge badge-red">告警</span>' }[sig.status];

  const tags = sig.tags.map(t => `<span class="tag">${t}</span>`).join(' ');

  const tlData = [
    { time: sig.firstSeen, color: 'var(--accent-cyan)', text: '首次发现并录入信号库' },
    { time: sig.firstSeen.split(' ')[0] + ' +2h', color: 'var(--accent-blue)', text: `AI初步分析完成，调制方式识别：${sig.mod}` },
    { time: sig.lastSeen.split(' ')[0] + ' 08:00', color: 'var(--accent-green)', text: '状态确认为：' + sig.label },
    { time: sig.lastSeen, color: sig.status==='alert'?'var(--accent-red)':'var(--text-muted)', text: '最近一次检测到信号' },
  ];

  document.getElementById('detail-panel').innerHTML = `
    <div class="detail-section">
      <div class="detail-section-header">
        <div class="detail-section-title">基本信息</div>
        <div style="display:flex;gap:6px;align-items:center">
          ${statusBadge}
          <span style="font-family:var(--font-mono);font-size:10px;color:var(--text-dim)">${sig.id}</span>
        </div>
      </div>
      <div class="detail-section-body">
        <div class="info-grid" style="margin-bottom:12px">
          <div class="info-cell">
            <div class="info-cell-label">中心频率</div>
            <div class="info-cell-value" style="color:var(--accent-cyan)">${sig.freqStr}</div>
          </div>
          <div class="info-cell">
            <div class="info-cell-label">信道带宽</div>
            <div class="info-cell-value">${sig.bw >= 1000 ? (sig.bw/1000)+'MHz' : sig.bw+'kHz'}</div>
          </div>
          <div class="info-cell">
            <div class="info-cell-label">调制方式</div>
            <div class="info-cell-value">${sig.mod}</div>
          </div>
          <div class="info-cell">
            <div class="info-cell-label">首次发现</div>
            <div class="info-cell-value" style="font-size:10.5px">${sig.firstSeen}</div>
          </div>
          <div class="info-cell">
            <div class="info-cell-label">累计发现</div>
            <div class="info-cell-value">${sig.count.toLocaleString()} 次</div>
          </div>
          <div class="info-cell">
            <div class="info-cell-label">最近出现</div>
            <div class="info-cell-value" style="font-size:10.5px">${sig.lastSeen}</div>
          </div>
        </div>
        <div style="display:flex;gap:4px;flex-wrap:wrap">${tags}</div>
      </div>
    </div>

    <div class="detail-section">
      <div class="detail-section-header">
        <div class="detail-section-title">测向与位置</div>
        <span class="badge badge-cyan">${sig.stations.length}站参与测向</span>
      </div>
      <div class="detail-section-body">
        <div id="detail-map"></div>
        <div style="margin-top:8px;font-family:var(--font-mono);font-size:10px;color:var(--text-dim)">
          参与站点：${sig.stations.map(id => STATIONS.find(s=>s.id===id)?.short).join(' · ')}
          &nbsp;·&nbsp; 定位精度 CEP ±120 m
        </div>
      </div>
    </div>

    <div class="detail-section">
      <div class="detail-section-header">
        <div class="detail-section-title">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="1" y="1" width="10" height="10" rx="1.5"/>
            <path d="M3 5h6M3 7.5h4"/>
          </svg>
          AI分析结论
        </div>
        <span style="font-family:var(--font-mono);font-size:10px;color:var(--text-dim)">置信度 ${sig.confidence}%</span>
      </div>
      <div class="detail-section-body">
        <div style="font-size:12.5px;color:var(--text-secondary);line-height:1.7">${sig.aiConclusion}</div>
        <div class="verdict-box" style="margin-top:10px">
          <div class="verdict-label" style="color:var(--accent-primary)">综合研判</div>
          <div class="verdict-text">
            信号特征与业务类型匹配度：${sig.confidence}%。${
              sig.status === 'known' ? '该信号已完成定性，归入已知信号库，建议持续监测变化。' :
              sig.status === 'unknown' ? '该信号尚未完成定性，建议增加测向频次，积累更多特征数据后进行深度解析。' :
              '该信号已触发告警，建议优先处置，相关证据已自动存档备查。'
            }
          </div>
        </div>
      </div>
    </div>

    <div class="detail-section">
      <div class="detail-section-header">
        <div class="detail-section-title">历史记录时间线</div>
      </div>
      <div class="detail-section-body">
        <div class="timeline">
          ${tlData.map(t => `
            <div class="tl-item">
              <div class="tl-time">${t.time}</div>
              <div class="tl-dot" style="background:${t.color}"></div>
              <div class="tl-body">${t.text}</div>
            </div>
          `).join('')}
        </div>
      </div>
    </div>
  `;

  // Init detail map
  setTimeout(() => initDetailMap(sig), 100);
}

function initDetailMap(sig) {
  if (detailMap) { detailMap.remove(); detailMap = null; }
  detailMap = L.map('detail-map', {
    center: [sig.emitLoc?.lat || 39.87, sig.emitLoc?.lng || 116.38],
    zoom: 12,
    zoomControl: false,
    attributionControl: false,
  });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(detailMap);

  STATIONS.filter(s => sig.stations.includes(s.id)).forEach(s => {
    const icon = L.divIcon({
      html: `<div style="width:16px;height:16px;border-radius:50%;background:rgba(6,182,212,0.2);border:1.5px solid #06b6d4;display:flex;align-items:center;justify-content:center;font-family:monospace;font-size:6px;color:#06b6d4">${s.short.split('-')[0]}</div>`,
      iconSize:[16,16], iconAnchor:[8,8], className:''
    });
    L.marker([s.lat, s.lng], {icon}).addTo(detailMap);

    if (sig.bearing[s.id] !== undefined) {
      const end = computeEndpoint(s.lat, s.lng, sig.bearing[s.id], 0.08);
      L.polyline([[s.lat, s.lng], end], {color:'#06b6d4', weight:1.5, opacity:0.7, dashArray:'5 3'}).addTo(detailMap);
    }
  });

  if (sig.emitLoc) {
    L.circle([sig.emitLoc.lat, sig.emitLoc.lng], {
      radius: 120, color: sig.status==='alert'?'#ef4444':'#06b6d4',
      fillColor: sig.status==='alert'?'#ef444430':'#06b6d430', fillOpacity:0.4, weight:2
    }).addTo(detailMap);
  }
}

function computeEndpoint(lat, lng, bearingDeg, dist) {
  const rad = (bearingDeg - 90) * Math.PI / 180;
  return [lat + dist * Math.sin(rad + Math.PI/2), lng + dist * Math.cos(rad + Math.PI/2)];
}

// ── Alert section ─────────────────────────────────────────────
function toggleAlertSection() {
  alertOpen = !alertOpen;
  document.getElementById('alert-body').style.display = alertOpen ? '' : 'none';
  document.getElementById('alert-toggle-icon').textContent = alertOpen ? '▲' : '▼';
}

function showAlert(idx, btn) {
  currentAlertIdx = idx;
  document.querySelectorAll('.alert-tab').forEach(t => t.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderAlertContent(idx);
}

function renderAlertContent(idx) {
  const alert = ALERTS[idx];
  const sig = SIGNALS.find(s => s.id === alert.signalId);
  const container = document.getElementById('alert-content');

  if (idx === 0) {
    // Black broadcast
    const bars = Array.from({length:60}, () => {
      const rng3 = seededRandom(Math.random()*1000);
      return Math.floor(rng3() * 80 + 10);
    });
    container.innerHTML = `
      <div class="info-grid" style="margin-bottom:12px">
        <div class="info-cell"><div class="info-cell-label">频点</div><div class="info-cell-value" style="color:var(--accent-red)">97.400 MHz</div></div>

let demoStep = -1;
let demoRunning = false;

function buildDemoSteps() {
  document.getElementById('demo-steps').innerHTML = DEMO_STEPS.map((s, i) => `
    <div class="demo-step" id="ds-${i}">
      <div class="demo-step-num">${s.num}</div>
      <div class="demo-step-body">
        <div class="demo-step-title">${s.title}</div>
        <div class="demo-step-desc">${s.desc}</div>
        <div class="demo-step-result">${s.result}</div>
      </div>
    </div>
  `).join('');
}

function startDemo() {
  if (demoRunning) return;
  demoRunning = true;
  demoStep = 0;
  document.getElementById('demo-btn').textContent = '执行中...';
  document.getElementById('demo-btn').disabled = true;

  // Reset all
  DEMO_STEPS.forEach((_, i) => {
    const el = document.getElementById('ds-' + i);
    if (el) { el.className = 'demo-step'; }
  });

  runDemoStep(0);
}

function runDemoStep(idx) {
  if (idx >= DEMO_STEPS.length) {
    document.getElementById('demo-btn').textContent = '✓ 定性完成';
    document.getElementById('demo-btn').style.background = 'var(--accent-green)';
    demoRunning = false;
    return;
  }

  const el = document.getElementById('ds-' + idx);
  if (el) {
    el.className = 'demo-step active';
    el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  // Mark previous as done
  if (idx > 0) {
    const prev = document.getElementById('ds-' + (idx-1));
    if (prev) prev.className = 'demo-step done';
  }

  setTimeout(() => runDemoStep(idx + 1), 1800 + Math.random() * 800);
}
