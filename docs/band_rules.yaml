    service_type: broadcasting
    channel_bw_khz: 200
    authority: national
    description: 调频广播，标准信道间隔100kHz，信号带宽约200kHz（含保护带），聚合粒度取200kHz
    anomaly_bw_threshold_khz: 400
    enabled: true

