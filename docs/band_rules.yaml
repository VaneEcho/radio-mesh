# RF·MESH 频段规则配置文件
# 版本：v0.1 | 生效日期：2026-03-13
#
# 依据：《中华人民共和国无线电频率划分规定》（工信部令第62号，2023年7月1日施行）
#       及各运营商、行业标准公开资料整理
#
# 字段说明：
#   freq_start_mhz        频段起始频率（MHz）
#   freq_end_mhz          频段结束频率（MHz）
#   service_name          业务中文名称
#   service_type          业务大类（枚举）
#   channel_bw_khz        聚合粒度（kHz）—— 用于频谱数据合并上传
#   authority             管理权限层级（national=国家 / provincial=省 / local=地方）
#   operator              运营商（移动通信频段专用，其余留空）
#   description           补充说明
#   anomaly_bw_threshold_khz  信号带宽超出此值时触发异常检测（null=不检测）
#   enabled               是否启用（false=跳过此频段不处理）
#
# 注意事项：
#   1. 同一频率点可能出现多条规则（如上行/下行分离的移动通信频段），以 sub_band 字段区分
#   2. channel_bw_khz 对于整段聚合（如运营商频段）设为 freq_end_mhz - freq_start_mhz 的 MHz 换算值
#   3. 此文件可通过系统后台管理页面维护，也可直接编辑后重新导入
# ─────────────────────────────────────────────────────────────────────────────

bands:

  # ───────────────────────── VHF 低频段 ─────────────────────────
  - id: 1
    freq_start_mhz: 20.0
    freq_end_mhz: 87.5
    service_name: VHF低频（短波过渡、政府、军事等）
    service_type: government
    channel_bw_khz: 100
    authority: national
    description: 含短波广播（部分）、政府专用、军事通信等，具体分配较复杂，以100kHz步进聚合保留基本分辨率
    anomaly_bw_threshold_khz: null
    enabled: true

  # ───────────────────────── FM广播 ─────────────────────────
  - id: 2
    freq_start_mhz: 87.5
    freq_end_mhz: 108.0
