version: "3.9"

services:

  # ── Redis (pub/sub for multi-worker stream broadcast) ────────────────────────
  redis:
    image: redis:7-alpine
    container_name: rfmesh-redis
    restart: unless-stopped
    command: redis-server --save "" --appendonly no  # ephemeral, no persistence needed
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── TimescaleDB ─────────────────────────────────────────────────────────────
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: rfmesh-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: rfmesh
      POSTGRES_USER: rfmesh
      POSTGRES_PASSWORD: rfmesh
    ports:
      - "5432:5432"
    volumes:
      - tsdb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rfmesh -d rfmesh"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Cloud API (FastAPI) ──────────────────────────────────────────────────────
  cloud:
    build:
      context: .
      dockerfile: cloud/Dockerfile
    container_name: rfmesh-cloud
    restart: unless-stopped
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://rfmesh:rfmesh@timescaledb:5432/rfmesh
      REDIS_URL: redis://redis:6379/0
      STREAM_BACKEND: redis   # redis | memory  (redis enables multi-worker broadcast)
      API_TOKEN: ""           # set a strong token in production
      LOG_LEVEL: INFO
      DATA_RETENTION_DAYS: "90"
    ports:
      - "8000:8000"

  # ── Frontend (Vue 3 + Nginx) ─────────────────────────────────────────────────
  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    container_name: rfmesh-frontend
    restart: unless-stopped
    depends_on:
      - cloud
    ports:
      - "3000:80"

volumes:
  tsdb_data:
